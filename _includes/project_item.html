<div class="project-item mb-4">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h3 class="project-title"><b>{{ project.title }}</b></h3>
            <p>{{ project.description }}</p>
            {% if project.code_url %}
            <div class="publication-links">
                <a href="{{ project.code_url }}" target="_blank" class="btn btn-outline-primary btn-sm"><i class="fas fa-code"> Code</i></a>
            </div>
            {% endif %}
        </div>
        {% if project.logo %}
        <img src="{{ '/assets/project-logos/' | append: project.logo | relative_url }}" class="project-logo ms-5" alt="{{ project.title }} logo">
        {% endif %}
    </div>
</div>
